<!DOCTYPE html>
<html>
<head>
    <title>Binary Calculator</title>
</head>
<body>
    <h1>Binary Calculator</h1>

    <form action="/" method="post">
        <label>Operand 1:</label>
        <input type="text" name="operand1" required><br><br>

        <label>Operator:</label>
        <select name="operator">
            <option value="+">+</option>
            <option value="*">*</option>
            <option value="&">&</option>
            <option value="|">|</option>
        </select><br><br>

        <label>Operand 2:</label>
        <input type="text" name="operand2" required><br><br>

        <button type="submit">Calculate</button>
    </form>
</body>
</html>
